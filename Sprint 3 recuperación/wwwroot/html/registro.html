<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script src="../js/elescriptxd.js" defer></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "registro",
      "url": "https://betisware.com/registro.html",
      "description": "Formulario para crear cuenta en betisware.com",
      "inLanguage": "es",
      "isPartOf": {
        "@type": "WebSite",
        "name": "Betisware",
        "url": "https://betisware.com"
      }
    }
    </script>
</head>
<body>
    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="../images/betisware_bien.png" alt="logo inicio"></a> </div>
        <nav class="nav-links">
            <a href="informes.html">Informes</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="servicios.html">Servicios</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
            <a href="iniciarsesion.html">Iniciar Sesión</a>
        </nav>
    </div>

    <div class="register-container">
        <h2>Crear Cuenta</h2>
            <form action="#" method="post" onsubmit="return handleRegister(event)"> 
        <table class="register-table">
            <tr>
                <td><label for="nombre">Nombre:</label></td>
                <td><input type="text" id="nombre" name="nombre" required="required"></td>
            </tr>
            <tr>
                <td><label for="email">Correo electrónico:</label></td>
                <td><input type="email" id="email" name="email" required="required"></td>
            </tr>
            <tr>
                <td><label for="usuario">Usuario:</label></td>
                <td><input type="text" id="usuario" name="usuario" required="required"></td>
            </tr>
            <tr>
                <td><label for="password">Contraseña:</label></td>
                <td><input type="password" id="password" name="password" required="required"></td>
            </tr>
            <tr>
                <td><label for="confirmar">Confirmar contraseña:</label></td>
                <td><input type="password" id="confirmar" name="confirmar" required="required"></td>
            </tr>
        </table>

        <button type="submit">Registrarse</button>
        <button type="button" class="volver-btn" onclick="window.location.href='iniciarsesion.html'">
            Volver a iniciar sesión
        </button>
            </form>
            <p id="register-message" style="color: red; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div class="footer-container"> <footer class="footer">

                    <a href="cookies.html">Política de Cookies</a>
                    <a href="terminos.html">Términos y Condiciones</a>
                    <a href="contacto.html">Contacto</a>
                </div>
            </div>
        </footer>
    </div>
    
</body>
</html>
