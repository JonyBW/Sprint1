<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="shortcut icon" href="../images/betisware_bien.png" type="image/x-icon">
</head>
<body>
    <div class="header"> <!-- Cabecera con logo y navegación -->
        <div class="logo">
            <a href="index.html"><img src="../images/betisware_bien.png" alt="logo inicio"></a> <!-- Logo con enlace a la página de inicio -->
        </div>
        <nav class="nav-links"> <!-- Navegación con enlaces a otras páginas -->
            <a href="proyectos.html">Proyectos</a>
            <a href="servicios.html">Servicios</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
            <a href="iniciarsesion.html">Iniciar Sesión</a>
        </nav>
    </div>


    <div class="login-container"> <!-- Formulario de inicio de sesión -->
        <h2>Iniciar Sesión</h2>
        <form action="#" method="post">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required="required">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required="required">

            <button type="submit">Entrar</button>
            <!-- Botón para crear cuenta -->
            <button type="button" class="register-btn" onclick="window.location.href='registro.html'">
                Crear cuenta
            </button>
        </form>
    </div>
    


    <div class="footer-container"> <!-- Pie de página con enlaces legales y de contacto -->
        <footer class="footer">
            <div class="footer-content">
                <p>© 2025 Betisware. Todos los derechos reservados.</p>
                <div class="footer-links">
                    <a href="preguntas.html">Preguntas Frecuentes</a>
                    <a href="aviso-legal.html">Aviso Legal</a>
                    <a href="privacidad.html">Política de Privacidad</a>
                    <a href="cookies.html">Política de Cookies</a>
                    <a href="terminos.html">Términos y Condiciones</a>
                    <a href="contacto.html">Contacto</a>
                </div>
            </div>
        </footer>
    </div>
    
</body>
</html>
