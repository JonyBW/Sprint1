<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="shortcut icon" href="../images/betisware bien.png" type="image/x-icon">
</head>
<body>
    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="../images/betisware bien.png" alt="logo inicio"></a> <!-- Logo con enlace a la página de inicio -->
        </div>
        <nav class="nav-links"> <!-- Navegación con enlaces a otras páginas -->
            <a href="servicios.html">Servicios</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
            <a href="iniciarsesion.html">Iniciar Sesión</a>
        </nav>
    </div>

    <div class="register-container">
        <h2>Crear Cuenta</h2>
            <form action="#" method="post">
        <table class="register-table">
            <tr>
                <td><label for="nombre">Nombre:</label></td>
                <td><input type="text" id="nombre" name="nombre" required></td>
            </tr>
            <tr>
                <td><label for="email">Correo electrónico:</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>
            <tr>
                <td><label for="usuario">Usuario:</label></td>
                <td><input type="text" id="usuario" name="usuario" required></td>
            </tr>
            <tr>
                <td><label for="password">Contraseña:</label></td>
                <td><input type="password" id="password" name="password" required></td>
            </tr>
            <tr>
                <td><label for="confirmar">Confirmar contraseña:</label></td>
                <td><input type="password" id="confirmar" name="confirmar" required></td>
            </tr>
        </table>

        <button type="submit">Registrarse</button>
        <button type="button" class="volver-btn" onclick="window.location.href='iniciarsesion.html'">
            Volver a iniciar sesión
        </button>
            </form>
    </div>

    <div class="footer-container"> <!-- Pie de página con enlaces legales y de contacto -->
        <footer class="footer">
            <div class="footer-content">
                <p>© 2025 Betisware. Todos los derechos reservados.</p>
                <div class="footer-links">
                    <a href="preguntas.html">Preguntas Frecuentes</a>
                    <a href="aviso-legal.html">Aviso Legal</a>
                    <a href="privacidad.html">Política de Privacidad</a>
                    <a href="cookies.html">Política de Cookies</a>
                    <a href="terminos.html">Términos y Condiciones</a>
                    <a href="contacto.html">Contacto</a>
                </div>
            </div>
        </footer>
    </div>
    
</body>
</html>
