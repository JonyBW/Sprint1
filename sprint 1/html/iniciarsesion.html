<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="shortcut icon" href="../images/betisware bien.png" type="image/x-icon">
</head>
<body>
    <div class="header"> <!-- Cabecera con logo y navegación -->
        <div class="logo">
            <a href="index.html"><img src="../images/betisware bien.png" alt="logo inicio"></a> <!-- Logo con enlace a la página de inicio -->
        </div>
        <nav class="nav-links"> <!-- Navegación con enlaces a otras páginas -->
            <a href="servicios.html">Servicios</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
            <a href="iniciarsesion.html">Iniciar Sesión</a>
        </nav>
    </div>


    <div class="hover-image"> <!-- Imagen bites the dust -->
        <img src="../images/Bites the dust.png" alt="bites the dust">
    </div>
    <!-- sonido -->
    <audio id="click-sound" src="../images/KQ bites the dust.mp3"></audio>

   <script> // script para la imagen bites the dust
        document.addEventListener('DOMContentLoaded', () => { // asegura que el DOM esté cargado
            const hoverImage = document.querySelector('.hover-image'); // selecciona la imagen
            const sound = document.getElementById('click-sound'); // selecciona el audio

        hoverImage.addEventListener('click', () => { // evento al hacer click
        
        if (sound) { // reproducir sonido
            sound.currentTime = 0;
            sound.play().catch(e => console.log('Error al reproducir audio:', e)); // maneja errores de reproducción
        }

        setTimeout(() => { // redirigir después de 4.1 segundos
            window.location.href = 'index.html'; // redirige a la página de inicio
        }, 4100);
        });
        });
    </script>



    <div class="login-container"> <!-- Formulario de inicio de sesión -->
        <h2>Iniciar Sesión</h2>
        <form action="#" method="post">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Entrar</button>
            <!-- Botón para crear cuenta -->
            <button type="button" class="register-btn" onclick="window.location.href='registro.html'">
                Crear cuenta
            </button>
        </form>
    </div>
    


    <div class="footer-container"> <!-- Pie de página con enlaces legales y de contacto -->
        <footer class="footer">
            <div class="footer-content">
                <p>© 2025 Betisware. Todos los derechos reservados.</p>
                <div class="footer-links">
                    <a href="preguntas.html">Preguntas Frecuentes</a>
                    <a href="aviso-legal.html">Aviso Legal</a>
                    <a href="privacidad.html">Política de Privacidad</a>
                    <a href="cookies.html">Política de Cookies</a>
                    <a href="terminos.html">Términos y Condiciones</a>
                    <a href="contacto.html">Contacto</a>
                </div>
            </div>
        </footer>
    </div>
    
</body>
</html>
